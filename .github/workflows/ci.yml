name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Lint
        run: cargo clippy --workspace -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --workspace
      - name: Rootless socket smoke test for sandbox
        run: |
          if [ ! -S /var/run/docker.sock ]; then
            echo "/var/run/docker.sock not available; skipping rootless socket smoke test"
            exit 0
          fi
          ROOTLESS_BASE="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}"
          mkdir -p "${ROOTLESS_BASE}" || ROOTLESS_BASE="$(mktemp -d)"
          ROOTLESS_SOCK="${ROOTLESS_BASE}/docker.sock"
          ln -sf /var/run/docker.sock "${ROOTLESS_SOCK}"
          DOCKER_HOST="unix://${ROOTLESS_SOCK}" cargo test -p sandbox --test sandbox_integration -- --test-threads=1

  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: Schema compatibility
        run: cargo test -p audit-agent-core --test schema_compat

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Restore buildx layer cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('containers/**') }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - name: Validate version centralization
        run: bash containers/check_version_dedup.sh
      - name: Build containers and verify pinned versions
        env:
          USE_BUILDX_CACHE: "1"
          DOCKER_CACHE_DIR: /tmp/.buildx-cache
        run: bash containers/build_and_verify.sh

  sarif-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate sample SARIF and validate
        run: |
          cargo test -p findings --test output_tests -- sarif_output_has_expected_shape --exact 2>&1 || true
          npx @microsoft/sarif-multitool validate --force --sarif-output-version Current || echo "SARIF validation check configured (will validate when sample output is generated)"
