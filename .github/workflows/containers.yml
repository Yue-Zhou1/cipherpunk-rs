name: Container Images

on:
  push:
    paths:
      - "deploy/containers/**"
      - ".github/workflows/containers.yml"
  pull_request:
    paths:
      - "deploy/containers/**"
      - ".github/workflows/containers.yml"

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate version centralization
        run: bash deploy/containers/check_version_dedup.sh
      - name: Build all tool images and verify versions
        run: bash deploy/containers/build_and_verify.sh
